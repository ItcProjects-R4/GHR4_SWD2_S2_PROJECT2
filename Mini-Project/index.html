<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-circles">
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="container">
        <div class="glass-card">
            <h1>Student Grade System</h1>
            <p>Click the button below to enter your score and see your result.</p>
            
            <button id="start-btn" class="main-btn">Check Grade</button>

            <div id="result-display" class="result-area">
                <span class="label">Your Grade:</span>
                <div id="grade-output" class="grade-text">--</div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
